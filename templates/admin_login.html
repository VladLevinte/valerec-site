{% extends "base.html" %}
{% block content %}

<h1>Admin Login</h1>
<p class="muted">Enter your admin password to view registrations and downloads.</p>

{% if error %}
  <div class="alert">{{ error }}</div>
{% endif %}

<form method="POST" class="form-card" style="max-width:520px;">
  <div class="field">
    <label>Password</label>
    <input type="password" name="password" required>
  </div>
  <button class="btn btn-wide" type="submit">Login</button>
</form>

{% endblock %}
